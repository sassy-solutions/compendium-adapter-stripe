name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  pack-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # MinVer needs full history

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test (unit only)
        run: |
          dotnet test -c Release --no-build \
            --filter "FullyQualifiedName!~IntegrationTests&FullyQualifiedName!~LoadTests"

      - name: Pack adapter package (excluding tests)
        run: |
          mkdir -p artifacts
          while IFS= read -r csproj; do
            name=$(basename "$csproj" .csproj)
            if [[ "$name" == Compendium.Adapters.* && "$name" != *.Tests ]]; then
              echo "Packing $name"
              dotnet pack "$csproj" -c Release --no-build -o artifacts/
            fi
          done < <(find src -name '*.csproj')
          ls -la artifacts/
          test "$(ls artifacts/*.nupkg 2>/dev/null | wc -l)" = "1" || { echo "Expected exactly 1 .nupkg in artifacts/"; exit 1; }

      - name: Push to nuget.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "::error::NUGET_API_KEY is empty. Set it as an organisation secret (visibility: this repo) or a repository secret. See docs/RELEASE.md."
            exit 1
          fi
          dotnet nuget push "artifacts/*.nupkg" \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Push to GitHub Packages (backup feed)
        continue-on-error: true
        run: |
          dotnet nuget push "artifacts/*.nupkg" \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --source https://nuget.pkg.github.com/sassy-solutions/index.json \
            --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          files: artifacts/*.nupkg
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, '-preview') || contains(github.ref, '-rc') || contains(github.ref, '-alpha') || contains(github.ref, '-beta') }}
