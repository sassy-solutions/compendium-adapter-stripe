name: Bug report
description: Something is broken
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: Clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Repro steps
      description: Minimal steps to reproduce.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Adapter version
      placeholder: "1.0.0-preview.8"
    validations:
      required: true
  - type: input
    id: framework
    attributes:
      label: Compendium.Abstractions version in use
      placeholder: "1.0.0-preview.8"
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: .NET SDK, OS, vendor SDK version, anything relevant.
